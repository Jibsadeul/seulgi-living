<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>슬기로운 자취생활</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, Roboto, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card { max-width: 320px; }
    .spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 16px;
      border: 3px solid #eee;
      border-top-color: #ef7722;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 16px; margin: 0 0 8px; }
    p { font-size: 14px; color: #666; margin: 0 0 20px; }
    .download-btn {
      display: inline-block;
      background: #ef7722;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 999px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <div class="spinner"></div>
      <h1>앱으로 이동 중...</h1>
      <p>슬기로운 자취생활 앱을 여는 중입니다.</p>
    </div>

    <div id="fallback" class="hidden">
      <h1 id="fallback-title">앱이 설치되어 있지 않습니다</h1>
      <p id="fallback-desc">아래 버튼으로 앱을 다운로드해주세요.</p>
      <a id="download-link" class="download-btn hidden" href="#">앱 다운로드</a>
    </div>

    <div id="invalid" class="hidden">
      <h1>잘못된 링크입니다</h1>
      <p>공유받은 링크를 다시 확인해주세요.</p>
    </div>
  </div>

  <script>
    // APK 새 버전을 낼 때마다 이 URL을 수동으로 갱신한다 (자동화는 범위 밖).
    var APK_DOWNLOAD_URL = 'https://github.com/Jibsadeul/seulgi-living/releases/download/v0.1.0-preview/application-2904612d-d4f4-4bc5-91d6-26dc0888f8a7.apk';
    var APP_SCHEME = 'seulgi-living';
    var FALLBACK_DELAY_MS = 1500;

    var params = new URLSearchParams(window.location.search);
    var domain = params.get('domain');
    var id = params.get('id');

    function showFallback() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('fallback').classList.remove('hidden');

      var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      if (isIOS) {
        document.getElementById('fallback-title').textContent = '앱이 설치되어 있지 않습니다';
        document.getElementById('fallback-desc').textContent = 'iOS는 추후 지원 예정입니다.';
      } else {
        var link = document.getElementById('download-link');
        link.href = APK_DOWNLOAD_URL;
        link.classList.remove('hidden');
      }
    }

    if (!domain || !id) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('invalid').classList.remove('hidden');
    } else {
      setTimeout(showFallback, FALLBACK_DELAY_MS);
      window.location.href = APP_SCHEME + '://' + domain + '/' + id;
    }
  </script>
</body>
</html>
